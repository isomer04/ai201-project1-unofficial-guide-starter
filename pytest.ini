[pytest]
# Repo uses a flat layout (modules at root); put the root on sys.path so tests
# in tests/ can `import retrieve`, `import query`, etc. regardless of how pytest
# is invoked (bare `pytest` or `python -m pytest`).
pythonpath = .
testpaths = tests

markers =
    integration: hits the real ChromaDB index and/or the real Groq LLM (slow, needs `python ingest.py` and a GROQ_API_KEY). Opt-in.

# Keep the default `pytest` run fast and offline: the mocked unit suite only.
# Run the real-pipeline eval layer explicitly with:  pytest -m integration
addopts = -m "not integration"
